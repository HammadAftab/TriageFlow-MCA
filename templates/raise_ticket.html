<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raise A Ticket</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #f5f7fb; font-family: 'Segoe UI', sans-serif; }
.navbar { background: #764ba2; }
.navbar-brand { color: white !important; font-weight: bold; }
.card { border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
.form-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container-fluid">
    <span class="navbar-brand">TriageFlow</span>
    <div class="ms-auto text-white">
    Welcome, {{ request.user.username }} |
    <a href="{% url 'logout' %}" class="btn btn-sm btn-light ms-2">Logout</a>
    </div>
</div>
</nav>

<div class="container mt-4" style="max-width: 600px;">
<div class="form-section">
    <h4 class="mb-4">Raise A Ticket</h4>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label for="subject" class="form-label">Subject</label>
            <input type="text" id="subject" name="subject" class="form-control" placeholder="Enter subject" required>
        </div>
        <div class="mb-3">
            <label for="body" class="form-label">Body</label>
            <textarea id="body" name="body" class="form-control" rows="5" placeholder="Describe your issue" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
</div>

</body>
</html>

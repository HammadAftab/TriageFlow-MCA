{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .nav-tabs .nav-link {
            border: none;
            color: #555;
        }

        .nav-tabs .nav-link.active {
            color: #764ba2;
            font-weight: bold;
        }

        .form-control {
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .btn-custom {
            background: #764ba2;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #5a3d91;
        }
    </style>
</head>

<body>

<div class="card p-4 text-center" style="width: 350px;">

    <!-- Logo -->
    <div class="mb-3 d-flex align-items-center justify-content-center gap-2">
        <svg width="45" height="45" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="50" fill="#764ba2"/>
            <path d="M30 55 L45 70 L70 35" stroke="white" stroke-width="8"/>
        </svg>
        <h4 class="m-0 fw-bold" style="color:#764ba2;">TriageFlow</h4>
    </div>

    <!-- ERROR MESSAGE -->
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">Login</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#signup">Signup</button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- LOGIN -->
        <div class="tab-pane fade show active" id="login">
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <input type="text" name="username" class="form-control" placeholder="Username" required>

                <input type="password" name="password" class="form-control" placeholder="Password" required>

                <button class="btn btn-custom w-100 mt-2">Login</button>
            </form>
        </div>

        <!-- SIGNUP -->
        <div class="tab-pane fade" id="signup">
            <form method="POST" action="{% url 'signup' %}">
                {% csrf_token %}

                <input type="text" name="username" class="form-control" placeholder="Username" required>

                <input type="text" name="full_name" class="form-control" placeholder="Full Name" required>

                <input type="email" name="email" class="form-control" placeholder="Email" required>

                <input type="date" name="dob" class="form-control" required>

                <input type="password" name="password" class="form-control" placeholder="Password" required>

                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>

                <button class="btn btn-custom w-100 mt-2">Sign Up</button>
            </form>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!-- LOGIN FORM -->
<div class="tab-pane fade show active" id="login">

    <form method="POST"
          action="{% url 'employee_login' %}"
          autocomplete="off">

        {% csrf_token %}

        <input type="text"
               name="employee_id"
               class="form-control"
               placeholder="Employee ID"
               autocomplete="off"
               required>

        <input type="password"
               name="password"
               class="form-control"
               placeholder="Password"
               autocomplete="new-password"
               required>

        <button class="btn btn-custom w-100 mt-2">
            Login
        </button>
    </form>

</div>

<!-- SIGNUP FORM -->
<div class="tab-pane fade" id="signup">

    <form method="POST"
          action="{% url 'employee_signup' %}"
          autocomplete="off">

        {% csrf_token %}

        <input type="text"
               name="full_name"
               class="form-control"
               placeholder="Full Name"
               autocomplete="off"
               required>

        <input type="email"
               name="email"
               class="form-control"
               placeholder="Email"
               autocomplete="off"
               required>

        <input type="date"
               name="dob"
               class="form-control"
               autocomplete="off"
               required>

        <select name="position"
                class="form-control"
                autocomplete="off"
                required>

            <option value="" selected disabled>Select Position</option>
            <option value="L1">L1</option>
            <option value="L2">L2</option>
            <option value="L3">L3</option>

        </select>

        <input type="password"
               name="password"
               class="form-control"
               placeholder="Password"
               autocomplete="new-password"
               required>

        <input type="password"
               name="confirm_password"
               class="form-control"
               placeholder="Confirm Password"
               autocomplete="new-password"
               required>

        <button class="btn btn-custom w-100 mt-2">
            Create Employee Account
        </button>
    </form>

</div>

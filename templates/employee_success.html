<!DOCTYPE html>
<html>
<head>
    <title>Employee Account Created</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 text-center shadow" style="width:400px;">

    <h3 class="mb-3">Employee Account Created</h3>

    <p>Your Employee ID is:</p>

    <h2 class="text-primary">{{ employee_id }}</h2>

    <p class="mt-3">
        Use this Employee ID and your password to login.
    </p>

    <a href="{% url 'employee_login' %}" class="btn btn-primary mt-3">
        Go To Employee Login
    </a>

</div>

</body>
</html>

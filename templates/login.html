{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .nav-tabs .nav-link {
            border: none;
            color: #555;
        }

        .nav-tabs .nav-link.active {
            color: #764ba2;
            font-weight: bold;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            background: #764ba2;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #5a3d91;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            cursor: pointer;
            border: none;
            background: transparent;
            color: #666;
            padding: 0;
        }
    </style>
</head>

<body>

<div class="card p-4 text-center" style="width: 350px;">

    <!-- Logo -->
    <div class="mb-3 d-flex align-items-center justify-content-center gap-2">
        <svg width="45" height="45" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="50" fill="#764ba2"/>
            <path d="M30 55 L45 70 L70 35" stroke="white" stroke-width="8"/>
        </svg>
        <h4 class="m-0 fw-bold" style="color:#764ba2;">TriageFlow</h4>
    </div>

    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <button class="nav-link active"
                    data-bs-toggle="tab"
                    data-bs-target="#login">
                Login
            </button>
        </li>

        <li class="nav-item">
            <button class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#signup">
                Signup
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- LOGIN -->
        <div class="tab-pane fade show active" id="login">

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <input type="text"
                       name="username"
                       class="form-control mb-2"
                       placeholder="Username"
                       required>

                <div class="password-wrapper mb-2">
                    <input type="password"
                        id="loginPassword"
                        name="password"
                        class="form-control"
                        placeholder="Password"
                        minlength="6"
                        required>

                    <button type="button"
                            class="password-toggle"
                            onclick="togglePassword('loginPassword', this)">
                            <i class="bi bi-eye"></i>
                    </button>
                </div>

                <button class="btn btn-custom w-100 mt-2">
                    Login
                </button>
            </form>

        </div>

        <!-- SIGNUP -->
        <div class="tab-pane fade" id="signup">

            <form method="POST" action="{% url 'signup' %}">
                {% csrf_token %}

                <input type="text"
                       name="username"
                       class="form-control mb-2"
                       placeholder="Username"
                       required>

                <input type="text"
                       name="full_name"
                       class="form-control mb-2"
                       placeholder="Full Name"
                       required>

                <input type="email"
                       name="email"
                       class="form-control mb-2"
                       placeholder="Email"
                       required>

                <input type="date"
                       name="dob"
                       class="form-control mb-2"
                       required>

                <div class="password-wrapper mb-2">
                    <input type="password"
                        id="signupPassword"
                        name="password"
                        class="form-control"
                        placeholder="Password"
                        minlength="6"
                        required>

                    <button type="button"
                            class="password-toggle"
                            onclick="togglePassword('signupPassword', this)">
                            <i class="bi bi-eye"></i>
                    </button>
                </div>

                <div class="password-wrapper mb-2">
                    <input type="password"
                        id="confirmPassword"
                        name="confirm_password"
                        class="form-control"
                        placeholder="Confirm Password"
                        minlength="6"
                        required>

                    <button type="button"
                            class="password-toggle"
                            onclick="togglePassword('confirmPassword', this)">
                            <i class="bi bi-eye"></i>
                    </button>
                </div>

                <button class="btn btn-custom w-100 mt-2">
                    Sign Up
                </button>

            </form>

        </div>

    </div>

    <div class="text-center mt-3">
        <a href="{% url 'employee_login' %}">
            Login as an employee?
        </a>
    </div>

</div>

<script>
function togglePassword(fieldId, button) {
    const field = document.getElementById(fieldId);
    const icon = button.querySelector("i");

    if (field.type === "password") {
        field.type = "text";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    } else {
        field.type = "password";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

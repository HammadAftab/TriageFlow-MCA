{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Employee Portal</title>

       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
       <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
       
       <style>
              body {
                     background: linear-gradient(135deg, #1e3c72, #2a5298);
                     height: 100vh;
                     display: flex;
                     justify-content: center;
                     align-items: center;
                     font-family: 'Segoe UI', sans-serif;
              }
              
              .card {
                     width: 420px;
                     border: none;
                     border-radius: 20px;
                     box-shadow: 0 10px 30px rgba(0,0,0,0.2);
              }

              .form-control {
                     border-radius: 10px;
                     margin-bottom: 10px;
              }

              .btn-custom {
                     background: #2a5298;
                     color: white;
                     border-radius: 10px;
              }

              .btn-custom:hover {
                     background: #1e3c72;
                     color: white;
              }

              .nav-tabs .nav-link.active {
                     color: #2a5298;
                     font-weight: bold;
              }

              .password-wrapper {
                     position: relative;
              }

              .password-wrapper .form-control {
                     padding-right: 45px;
                     margin-bottom: 0;
              }

              .password-toggle {
                     position: absolute;
                     right: 12px;
                     top: 50%;
                     transform: translateY(-50%);
                     border: none;
                     background: transparent;
                     cursor: pointer;
                     font-size: 16px;
                     color: #666;
                     z-index: 10;
              }
       </style>
</head>

<script>
function togglePassword(fieldId, button) {
    const field = document.getElementById(fieldId);

    if (field.type === "password") {
        field.type = "text";
    } else {
        field.type = "password";
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<body>

       <div class="card p-4">
              <h3 class="text-center mb-3">Employee Portal</h3>

              {% if error %}
              <div class="alert alert-danger">
                     {{ error }}
              </div>
              {% endif %}

              <ul class="nav nav-tabs mb-3">
                     <li class="nav-item">
                            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">
                                   Login
                            </button>
                     </li>

                     <li class="nav-item">
                            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#signup">
                                   Signup
                            </button>
                     </li>
              </ul>
              
              <div class="tab-content">

                     <!-- LOGIN -->
                     <div class="tab-pane fade show active" id="login">

                     <form method="POST"
                            action="{% url 'employee_login' %}"
                            autocomplete="off">

                            {% csrf_token %}

                            <input type="text"
                                   name="employee_id"
                                   class="form-control"
                                   placeholder="Employee ID"
                                   required>

                            <div class="password-wrapper mb-2">
                                   <input type="password"
                                          id="loginPassword"
                                          name="password"
                                          class="form-control"
                                          placeholder="Password"
                                          required>

                                   <button type="button"
                                          class="password-toggle"
                                          onclick="togglePassword('loginPassword', this)">
                                          👁
                                   </button>
                            </div>
                            <button class="btn btn-custom w-100 mt-2">
                            Login
                            </button>

                     </form>

                     </div>

                     <!-- SIGNUP -->
                     <div class="tab-pane fade" id="signup">

                     <form method="POST"
                            action="{% url 'employee_signup' %}"
                            autocomplete="off">

                            {% csrf_token %}

                            <input type="text"
                                   name="full_name"
                                   class="form-control"
                                   placeholder="Full Name"
                                   required>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   placeholder="Email"
                                   required>

                            <input type="date"
                                   name="dob"
                                   class="form-control"
                                   required>

                            <select name="position"
                                   class="form-control"
                                   required>

                            <option value="" selected disabled>
                                   Select Position
                            </option>

                            <option value="L1">L1</option>
                            <option value="L2">L2</option>
                            <option value="L3">L3</option>

                            </select>

                            <div class="password-wrapper mb-2">
                                   <input type="password"
                                          id="signupPassword"
                                          name="password"
                                          class="form-control"
                                          placeholder="Password"
                                          autocomplete="new-password"
                                          required>

                                   <button type="button"
                                          class="password-toggle"
                                          onclick="togglePassword('signupPassword', this)">
                                          👁
                                   </button>
                                   </div>

                                   <div class="password-wrapper mb-2">
                                   <input type="password"
                                          id="confirmPassword"
                                          name="confirm_password"
                                          class="form-control"
                                          placeholder="Confirm Password"
                                          autocomplete="new-password"
                                          required>

                                   <button type="button"
                                          class="password-toggle"
                                          onclick="togglePassword('confirmPassword', this)">
                                          👁
                                   </button>
                            </div>

                            <button class="btn btn-custom w-100 mt-2">
                                   Create Employee Account
                            </button>

                     </form>

                     </div>

              </div>

              <div class="text-center mt-3">
                     <a href="{% url 'login' %}">
                            Are you a User? Login here
                     </a>
              </div>

       </div>

       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
